<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: "Segoe UI", "Poppins", "Microsoft YaHei", sans-serif;
    background: url("https://images.unsplash.com/photo-1522383225653-ed111181a951?auto=format&fit=crop&w=1920&q=80") center/cover no-repeat;
    position: relative;
}

/* ---------- 风感统一：樱花飘落 ---------- */
.petal {
    position: absolute;
    top: -20px;
    width: 14px;
    height: 14px;
    background: radial-gradient(circle, #ffb7c5, #ff9eb0);
    border-radius: 80% 0 80% 0;
    transform: rotate(45deg);
    opacity: 0.72;
    z-index: 1;
    animation: sakuraWind linear infinite;
}

/* 风吹联动：左右摆动 + 下落 */
@keyframes sakuraWind {
    0% {
        transform: translate(0px, 0px) rotate(0deg);
    }
    20% {
        transform: translate(12px, 22vh) rotate(80deg);
    }
    40% {
        transform: translate(-10px, 45vh) rotate(160deg);
    }
    60% {
        transform: translate(14px, 68vh) rotate(240deg);
    }
    80% {
        transform: translate(-8px, 88vh) rotate(320deg);
    }
    100% {
        transform: translate(10px, 110vh) rotate(360deg);
    }
}

.p1 { left: 5%; animation-duration: 10s; }
.p2 { left: 15%; animation-duration: 13s; }
.p3 { left: 25%; animation-duration: 11s; }
.p4 { left: 40%; animation-duration: 15s; }
.p5 { left: 55%; animation-duration: 12s; }
.p6 { left: 70%; animation-duration: 14s; }
.p7 { left: 85%; animation-duration: 10s; }
.p8 { left: 95%; animation-duration: 16s; }

/* ---------- 上方撕纸 ---------- */
.shang {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 18vh;
    z-index: 3;
}

.shang img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ---------- 底部撕纸（风感联动版） ---------- */
.xia {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 18vh;
    z-index: 20;
    pointer-events: none;
    overflow: hidden;
}

/* 与樱花风感统一 */
@keyframes paperWind {
    0% {
        transform: translateY(0px) rotate(0deg);
    }
    20% {
        transform: translateY(-1px) rotate(0.15deg);
    }
    40% {
        transform: translateY(1px) rotate(-0.1deg);
    }
    60% {
        transform: translateY(-0.8px) rotate(0.12deg);
    }
    80% {
        transform: translateY(0.6px) rotate(-0.08deg);
    }
    100% {
        transform: translateY(0px) rotate(0deg);
    }
}

.xia img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center bottom;
    display: block;

    clip-path: polygon(
        0% 20%,
        4% 18%,
        8% 22%,
        12% 17%,
        16% 23%,
        20% 19%,
        24% 24%,
        28% 18%,
        32% 22%,
        36% 17%,
        40% 25%,
        44% 19%,
        48% 23%,
        52% 18%,
        56% 22%,
        60% 17%,
        64% 24%,
        68% 18%,
        72% 23%,
        76% 19%,
        80% 25%,
        84% 18%,
        88% 22%,
        92% 17%,
        96% 21%,
        100% 20%,
        100% 100%,
        0% 100%
    );

    animation: paperWind 4s ease-in-out infinite;
    transform-origin: center bottom;
    filter: drop-shadow(0 -2px 5px rgba(255, 182, 193, 0.15));
}

/* ---------- 导航按钮 ---------- */
.nav-buttons {
    position: absolute;
    top: 28px;
    right: 40px;
    z-index: 20;
    display: flex;
    gap: 18px;
}

.btn {
    padding: 10px 26px;
    font-size: 0.95rem;
    font-weight: 600;

    border-radius: 40px;
    background: rgba(255, 192, 203, 0.95);
    color: #b3405a;
    text-decoration: none;
    transition: 0.25s;
    border: 1px solid rgba(255,255,255,0.8);
}

.btn:hover {
    background: #ffb7c5;
    transform: scale(1.05) translateY(-3px);
    color: white;
}

/* ---------- 标题 ---------- */
.title-wrapper {
    position: absolute;
    top: 22vh;
    width: 100%;
    text-align: center;
    z-index: 12;
    opacity: 0;
    transition: 1s;
}

.title {
    font-size: 4.5vw;
    font-weight: 900;
    color: #fff;
    text-shadow: 4px 4px 18px rgba(0,0,0,0.6), 0 0 12px #ff99aa;
}

/* ---------- 建筑群 ---------- */
.buildings {
    position: absolute;
    bottom: 8vh;
    height: 61vh;
    width: 100%;
    z-index: 5;
}

.building {
    position: absolute;
    bottom: 0;
    opacity: 0;
    transform: translateY(120px) scale(0.5);
    filter: drop-shadow(10px 15px 20px rgba(0,0,0,0.3));
    animation: pop 0.8s forwards;
}

.building img {
    height: 100%;
    width: auto;
    display: block;
}

@keyframes pop {
    0% {
        opacity: 0;
        transform: translateY(120px) scale(0.5);
    }
    70% {
        transform: translateY(-8px) scale(1.05);
    }
    100% {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.huanghelou { left: 1%; height: 100%; z-index: 6; animation-delay: 0s; }
.qingchuange { left: 18%; height: 58%; z-index: 8; animation-delay: 0.5s; }
.bowuguan { left: 32%; height: 88%; z-index: 5; animation-delay: 1.5s; }
.zhonglou { right: 2%; height: 92%; z-index: 5; animation-delay: 2s; }
.wuda { right: 14%; height: 54%; z-index: 8; animation-delay: 1s; }

/* ---------- Custom Hello Kitty Cursor（修复版） ---------- */
html,
body {
    cursor: url("images/1.cur"), auto;
}

a,
button,
.btn,
.nav-link,
.carousel-arrow,
.carousel-dot {
    cursor: url("images/1.cur"), pointer;
}
</style>
</head>

    <div class="building bowuguan"><img src="images/3.png" alt="Hubei Provincial Museum"></div>
    <div class="building zhonglou"><img src="images/4.png" alt="Jianghan Customs House Clock Tower"></div>
    <div class="building wuda"><img src="images/5.png" alt="Wuhan University Gate"></div>
